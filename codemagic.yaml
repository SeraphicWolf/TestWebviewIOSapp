workflows:
  # Builds an UNSIGNED .ipa. No Apple Developer Program membership required.
  # You sign + install it yourself afterwards using Sideloadly or AltStore
  # with your free Apple ID (re-sideload every 7 days — that's an Apple
  # free-tier limit, not something this workflow can change).
  ios-webview-app-unsigned:
    name: iOS WebView App (unsigned, for sideloading)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: "WebViewApp.xcodeproj"
        XCODE_SCHEME: "WebViewApp"
    scripts:
      - name: Build unsigned .app (Release, no code signing)
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build
      - name: Package unsigned .app into a sideload-ready .ipa
        script: |
          mkdir -p build/Payload
          cp -r "build/Build/Products/Release-iphoneos/WebViewApp.app" build/Payload/
          cd build && zip -r WebViewApp-unsigned.ipa Payload
    artifacts:
      - build/WebViewApp-unsigned.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - vnull@proton.me
        notify:
          success: true
          failure: true
